# .github/workflows/publish-intraday-ohlc.yml
#
# Frequent-cadence workflow that polls live prices, accumulates ticks
# into 15m OHLC bars, and publishes intraday-ohlc.json with full OHLC.
#
# DEPLOYMENT NOTE — Path A (parallel filename):
# This workflow writes to `intraday-ohlc.json`, NOT `intraday.json`.
# The existing `fetch-prices.yml` workflow continues writing to
# `intraday.json` unchanged. The dashboard prefers `intraday-ohlc.json`
# when available, falls back to `intraday.json` otherwise.
#
# This avoids the two workflows racing over the same file. Once the new
# publisher has run reliably for 1-2 weeks, you can migrate to Path B
# (replace the existing publisher's intraday output) for cleaner
# architecture.

name: Publish Intraday OHLC

on:
  schedule:
    # Every 2 minutes for tick aggregation. The existing fetch-prices
    # workflow runs every 15 minutes and continues to handle prices.json
    # / history.json / intraday.json — this is purely an OHLC-enrichment
    # supplement.
    - cron: '*/2 * * * *'
  workflow_dispatch:

# Prevent overlapping runs (one publisher at a time)
concurrency:
  group: publish-intraday-ohlc
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run publisher
        env:
          # Uses the same secret names as fetch-prices.yml for consistency
          TD_API_KEY: ${{ secrets.TD_API_KEY }}
          OANDA_TOKEN: ${{ secrets.OANDA_TOKEN }}
        run: |
          python publish_intraday_ohlc.py --state intraday-state.json --output intraday-ohlc.json

      - name: Pull latest before commit
        run: |
          git pull --rebase origin main || true

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add intraday-ohlc.json intraday-state.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: update intraday OHLC [skip ci]"
            git push origin main
          fi
