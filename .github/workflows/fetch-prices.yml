name: Fetch prices

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify fetch-prices.js exists
        run: |
          if [ ! -f fetch-prices.js ]; then
            echo "::error::fetch-prices.js missing from repo root"
            ls -la
            exit 1
          fi

      - name: Fetch prices
        env:
          TD_API_KEY: ${{ secrets.TD_API_KEY }}
          OANDA_TOKEN: ${{ secrets.OANDA_TOKEN }}
        run: node fetch-prices.js

      - name: Pull latest before commit
        run: |
          git pull --rebase origin main || true

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prices.json
          if [ -f history.json ]; then
            git add history.json
            echo "Including history.json in commit"
          else
            echo "history.json does not exist (yet) - committing prices.json only"
          fi
          if [ -f intraday.json ]; then
            git add intraday.json
            echo "Including intraday.json in commit"
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update prices"
            git push origin main
          fi

      - name: Build package.json for npm
        run: |
          VERSION="1.0.$(date +%s)"
          cat > package.json <<PKG
          {
            "name": "vikinginvest-prices",
            "version": "$VERSION",
            "description": "Live FX prices for Viking Invest dashboard",
            "main": "prices.json",
            "jsdelivr": "prices.json",
            "license": "MIT",
            "repository": {
              "type": "git",
              "url": "git+https://github.com/ModernViking1/vikinginvest-prices.git"
            }
          }
          PKG

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access=public

      - name: Purge jsDelivr cache
        run: |
          curl -s "https://purge.jsdelivr.net/npm/vikinginvest-prices@latest/prices.json" || true
          curl -s "https://purge.jsdelivr.net/npm/vikinginvest-prices@latest/history.json" || true
          curl -s "https://purge.jsdelivr.net/npm/vikinginvest-prices@latest/intraday.json" || true
